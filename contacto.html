<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lara De Luca Contacto</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" href="img/favicon.svg" type="image/x-icon" width="50" height="50">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Milonga&display=swap');
    </style>
    <link rel="stylesheet" type="text/css" href="js/jquery.fancybox.css">

</head>

<body class="contacto-body">

    <header class="contacto-header">


        <nav>
            <a href="index.html">
                <img src="img/isotipo-inicio.svg" alt="isotipo del inicio" width="30" height="36" />
            </a>
        </nav>

    </header>


    <main class="contacto-main">
        <h2>Hablemos!</h2>
        <p>* Estos campos son obligatorios</p>
        <form method="post" action="mailto:laradeluca29@gmail.com?subject=e-mail enviado desde el sitio web"
            target="_blank" enctype="text/plain">
            <div>
                <label for="Nombre">* Nombre:</label>
                <input type="text" name="name" placeholder="Tu Nombre" id="Nombre" maxlength="50" required />

                <label for="Email">* Email:</label>
                <input type="email" name="email" placeholder="Tu e-mail" id="Email" maxlength="50" required />

                <label for="Edad">Edad:</label>
                <input type="number" name="edad" id="Edad" min="18" max="100" />

                <label for="Fecha de Nacimiento">Fecha de Nacimiento:</label>
                <input type="date" name="fecha_nacimiento" id="Fecha de Nacimiento" />
            </div>


            <div>
                <p>Por dónde me conociste?</p>
                <label for="Donde me conociste">Redes Sociales<input type="radio" name="conocimiento"
                        value="redes sociales" id="redes sociales" /></label>
                <label for="Donde me conociste">Publicidad<input type="radio" name="conocimiento" value="publicidad"
                        id="publicidad" /></label>
                <label for="Donde me conociste">Recomendación<input type="radio" name="conocimiento"
                        value="recomendacion" id="recomendacion" /></label>

                <label for="Teléfono">Teléfono:</label>
                <input type="tel" name="Telefono" id="Telefono" placeholder="Tu teléfono" />
            </div>

            <div>
                <label for="Mensaje">* Contame sobre tu proyecto</label>
                <textarea name="Mensaje" id="Mensaje"></textarea>

                <input type="submit" value="Enviar" />
            </div>

        </form>

    </main>


    <footer>
        <div class="footer-contenedor">
            <div class="izquierda-footer">
                <p class="footer-titulo">¿Tenés una idea?</p>
                <h3 class="footer-subtitulo">Contactame y la hacemos realidad</h3>
            </div>

        </div>

        <div>
            <p class="footer-derechos">© 2026 Lara De Luca. Todos los derechos reservados.</p>
        </div>
    </footer>

</body>

</html>
